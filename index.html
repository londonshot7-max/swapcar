<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarSwap.sk — Už čoskoro</title>
<meta name="description" content="CarSwap.sk — slovenský marketplace pre výmenu a predaj vozidiel. Už čoskoro.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orange: #ff5500;
    --orange-dim: rgba(255, 85, 0, 0.15);
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --text: #e8e8e8;
    --muted: #666;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Animated background glow */
  .bg-glow {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .bg-glow::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,85,0,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 4s ease-in-out infinite;
  }

  .bg-glow::after {
    content: '';
    position: absolute;
    width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: scanline 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  @keyframes scanline {
    0% { top: 20%; opacity: 0; }
    50% { opacity: 1; }
    100% { top: 80%; opacity: 0; }
  }

  /* Grid lines background */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,85,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,85,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  /* Logo */
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(3rem, 10vw, 7rem);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 0.2em;
    animation: fadeUp 0.8s ease both;
  }

  .logo span {
    color: var(--orange);
    position: relative;
  }

  .logo span::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: var(--orange);
    transform: scaleX(0);
    animation: underline 0.6s ease 1s both;
  }

  @keyframes underline {
    to { transform: scaleX(1); }
  }

  /* Tagline */
  .tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3rem;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 2px;
    background: var(--orange);
    margin: 0 auto 3rem;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  /* Coming soon text */
  .coming-soon {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 3vw, 1.4rem);
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 1rem;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .description {
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: var(--muted);
    max-width: 420px;
    line-height: 1.7;
    margin-bottom: 3rem;
    font-weight: 300;
    animation: fadeUp 0.8s ease 0.5s both;
  }

  /* Email form */
  .notify-form {
    display: flex;
    gap: 0;
    max-width: 420px;
    width: 100%;
    animation: fadeUp 0.8s ease 0.6s both;
  }

  .notify-form input {
    flex: 1;
    background: var(--dark3);
    border: 1px solid #2a2a2a;
    border-right: none;
    color: var(--text);
    padding: 0.85rem 1.2rem;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .notify-form input::placeholder { color: var(--muted); }
  .notify-form input:focus { border-color: var(--orange); }

  .notify-form button {
    background: var(--orange);
    color: #fff;
    border: none;
    padding: 0.85rem 1.5rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .notify-form button:hover { background: #e64d00; }
  .notify-form button:active { transform: scale(0.98); }

  /* Success message */
  .success {
    display: none;
    color: var(--orange);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-size: 0.95rem;
    animation: fadeUp 0.4s ease both;
  }

  /* Features preview */
  .features {
    display: flex;
    gap: 2rem;
    margin-top: 3.5rem;
    animation: fadeUp 0.8s ease 0.7s both;
  }

  .feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .feature-icon {
    width: 36px;
    height: 36px;
    border: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--orange);
    transition: border-color 0.2s;
  }

  .feature:hover .feature-icon { border-color: var(--orange); }

  .feature-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }

  /* Bottom bar */
  .bottom {
    position: fixed;
    bottom: 1.5rem;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 2rem;
    z-index: 10;
    animation: fadeUp 0.8s ease 0.9s both;
  }

  .bottom a {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .bottom a:hover { color: var(--orange); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Blinking cursor */
  .cursor {
    display: inline-block;
    width: 3px;
    height: 0.8em;
    background: var(--orange);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @media (max-width: 480px) {
    .features { gap: 1.2rem; }
    .notify-form { flex-direction: column; }
    .notify-form input { border-right: 1px solid #2a2a2a; border-bottom: none; }
    .notify-form input:focus { border-color: var(--orange); }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="grid-bg"></div>

<div class="container">

  <div class="logo">Car<span>Swap</span>.sk<span class="cursor"></span></div>
  <div class="tagline">Slovenský marketplace pre vozidlá</div>
  <div class="divider"></div>

  <div class="coming-soon">Už čoskoro</div>
  <p class="description">
    Kupuj, predávaj a vymeň vozidlo priamo na Slovensku. 
    Nechaj nám email a budeš prvý, kto sa dozvie o spustení.
  </p>

  <div class="notify-form" id="form">
    <input type="email" id="email" placeholder="tvoj@email.sk" />
    <button onclick="subscribe()">Notifikovať</button>
  </div>
  <div class="success" id="success">✓ &nbsp;Zaregistrovaný — dáme ti vedieť!</div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🚗</div>
      <div class="feature-label">Predaj</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🔄</div>
      <div class="feature-label">Výmena</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🏆</div>
      <div class="feature-label">Aukcie</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🤝</div>
      <div class="feature-label">Komunita</div>
    </div>
  </div>

</div>

<div class="bottom">
  <a href="mailto:info@carswap.sk">info@carswap.sk</a>
  <span style="color:#2a2a2a">|</span>
  <a href="#">© 2026 CarSwap.sk</a>
</div>

<script>
function subscribe() {
  const email = document.getElementById('email').value;
  if (!email || !email.includes('@')) {
    document.getElementById('email').style.borderColor = '#ff3333';
    setTimeout(() => document.getElementById('email').style.borderColor = '#2a2a2a', 1500);
    return;
  }
  document.getElementById('form').style.display = 'none';
  document.getElementById('success').style.display = 'block';
}

document.getElementById('email').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') subscribe();
});
</script>

</body>
</html>
